project:
  type: website
  resources:
    - assets
    - "*.pdf"  # CV PDF fetched from ConnorB/CV during CI build

execute:
  freeze: auto
  
# Metadata stuff
pagetitle: "{{< meta title >}} | Connor Brown"
author-meta: "Connor Brown"

website:
  site-url: https://ConnorB.github.io
  favicon: assets/favicon/favicon.ico
  image: assets/images/con-header.webp  # default social preview for image-less pages
  twitter-card: true
  open-graph: true
  llms-txt: true
  search: false
  google-analytics: "G-ELB0F4QNPS"
  # Navbar with social links
  navbar:
    left:
      - text: About
        href: index.qmd
      - text: Publications
        href: publications.qmd
      - text: Software
        href: software.qmd
      - text: CV
        href: cv.qmd
      - text: Teaching
        href: teaching.qmd
  # Footer with same social links
  page-footer:
    left: |
      © <span id="footer-year">2026</span> Connor Brown
      <script>document.getElementById("footer-year").textContent = new Date().getFullYear();</script>
    right: |
      <nav class="footer-social" aria-label="Social links">
        <a href="https://github.com/ConnorB" aria-label="GitHub">{{< fa brands github >}}</a>
        <a href="https://fediscience.org/@connor" rel="me" aria-label="Mastodon">{{< fa brands mastodon >}}</a>
        <a href="https://instagram.com/conbro_" aria-label="Instagram">{{< fa brands instagram >}}</a>
        <a href="https://bsky.app/profile/connorbrown.bsky.social" aria-label="Bluesky">{{< fa brands bluesky >}}</a>
        <a href="https://x.com/eco_conn" aria-label="X / Twitter">{{< fa brands twitter >}}</a>
        <a href="https://scholar.google.com/citations?user=ppjBxFEAAAAJ&hl=en" aria-label="Google Scholar">{{< fa brands google-scholar >}}</a>
        <a href="https://orcid.org/0000-0002-9680-8930" rel="me" aria-label="ORCID">{{< fa brands orcid >}}</a>
      </nav>
format:
  html:
    theme:
      - darkly
      - assets/css/custom.scss
    css: assets/css/styles.css
    toc: true
    include-in-header:
      - assets/favicon/favicon.html
      - assets/mastodon-verify.html
      - assets/css/fonts.html
      - assets/structured-data.html
